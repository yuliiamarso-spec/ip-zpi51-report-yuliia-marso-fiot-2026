<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 4 — Таймер</title>
    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast/dist/css/iziToast.min.css">

    <script src="https://cdn.jsdelivr.net/npm/flatpickr" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/izitoast/dist/js/iziToast.min.js" defer></script>

    <script src="js/timer.js" defer></script>
</head>

<body>

<div class="task-page">

    <nav class="task-nav">
        <a href="index.html">Головна</a>
        <a href="cart.html">Кошик</a>
        <a href="gallery.html">Галерея</a>
        <a href="form.html">Форма</a>
        <a href="timer.html">Таймер</a>
        <a href="snackbar.html">Проміси</a>
        <a href="image-search.html">Пошук</a>
    </nav>

    <header class="task-header">
        <h1>Завдання 4</h1>
        <p>Таймер зворотного відліку</p>
    </header>

    <main class="task-box">
        <input type="text" id="datetime-picker">
        <button type="button" data-start>Start</button>

        <div class="timer">
            <div class="field">
                <span class="value" data-days>00</span>
                <span class="label">Days</span>
            </div>

            <div class="field">
                <span class="value" data-hours>00</span>
                <span class="label">Hours</span>
            </div>

            <div class="field">
                <span class="value" data-minutes>00</span>
                <span class="label">Minutes</span>
            </div>

            <div class="field">
                <span class="value" data-seconds>00</span>
                <span class="label">Seconds</span>
            </div>
        </div>
    </main>

</div>

</body>
</html>
